spring:
  application:
    name: notification-service

  datasource:
    url: jdbc:h2:mem:notifydb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false

  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8282

notification:
  queue:
    capacity: 10000
    worker-threads: 4
  retry:
    max-attempts: 3
    initial-delay-ms: 1000
    backoff-multiplier: 2.0
    max-delay-ms: 30000
  webhook:
    enabled: true
    timeout-ms: 5000

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

---
spring:
  config:
    activate:
      on-profile: postgres
  datasource:
    url: jdbc:postgresql://localhost:5432/notifydb
    driver-class-name: org.postgresql.Driver
    username: postgres
    password: postgres
  h2:
    console:
      enabled: false
  jpa:
    hibernate:
      ddl-auto: update
